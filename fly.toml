app = "analytics-audit"
primary_region = "ord"

[build]

[deploy]
  release_command = "node_modules/.bin/prisma migrate deploy"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  SHOPIFY_API_KEY = "c3119635baccd8eaa8b92a8b10788f24"
  SHOPIFY_APP_URL = "https://analytics-audit.fly.dev"
  SCOPES = "read_themes,read_script_tags,read_pixels,read_content"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[processes]
  app = "npm run start"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
